<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community | NomiTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="style.css" rel="stylesheet">
    <style>
        body {
            background: #000 !important;
        }
        .navbar {
            background: rgba(0, 0, 0, 0.8) !important;
        }
    </style>
</head>
<body class="text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top glass-card mx-3 mt-3 z-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">NOMI<span class="text-accent">TECH</span></a>
            <div class="d-flex gap-2">
                <a href="chat.html" class="btn btn-accent rounded-pill px-4"><i class="bi bi-chat-fill me-1"></i>Global Chat</a>
                <a href="index.html" class="btn btn-outline-light rounded-pill px-4">Back to Home</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container" style="margin-top: 120px; min-height: 80vh;">
        <div class="text-center mb-5">
            <h1 class="fw-bold mb-3">Community Members</h1>
            <p class="text-secondary">Explore all registered users and their account details on the platform.</p>
        </div>
        
        <div class="row g-4" id="usersGrid">
            <!-- Populated by JS -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('usersGrid');
            const users = JSON.parse(localStorage.getItem('users')) || {};
            
            // Ensure nomitech (the owner) is always in the list
            if (!users['nomitech']) {
                users['nomitech'] = { password: 'admin', badge: 'legend', profilePic: null };
            }

            // Add some demo users if the list is mostly empty
            const demoUsers = {
                'AlexCloud': { password: 'demo', badge: 'pro', profilePic: null },
                'SarahWeb': { password: 'demo', badge: 'vip', profilePic: null },
                'JohnDev': { password: 'demo', badge: 'member', profilePic: null }
            };

            for (const [dName, dData] of Object.entries(demoUsers)) {
                if (!users[dName]) {
                    users[dName] = dData;
                }
            }
            
            const currentUser = localStorage.getItem('currentUser');
            let html = '';
            
            for (const [uname, data] of Object.entries(users)) {
                const isMe = (uname === currentUser);
                
                let badgeHtml = '';
                let userBadge = data.badge;
                
                // nomitech is always legend
                if (uname.toLowerCase() === 'nomitech') {
                    userBadge = 'legend';
                } else if (!userBadge || userBadge === 'none') {
                    // Everyone else is at least a member
                    userBadge = 'member';
                }

                if (userBadge) {
                    let badgeText = userBadge.toUpperCase();
                    if(userBadge === 'legend') badgeText = 'LEGEND 👑';
                    badgeHtml = `<span class="badge mt-2 badge-${userBadge}">${badgeText}</span>`;
                }

                const isOnline = (uname === currentUser || uname === 'nomitech' || uname.includes('Cloud') || uname.includes('Web') || uname.includes('Dev'));
                const statusHtml = isOnline 
                    ? `<span class="badge bg-success-subtle text-success border border-success border-opacity-25 rounded-pill px-3 py-1 small">
                        <span class="status-pulse me-1"></span> Online
                       </span>`
                    : `<span class="badge bg-secondary-subtle text-secondary border border-secondary border-opacity-10 rounded-pill px-3 py-1 small">Offline</span>`;

                const picUrl = data.profilePic || `https://ui-avatars.com/api/?name=${uname}&background=9CA3AF&color=fff`;

                html += `
                    <div class="col-md-4 col-lg-3">
                        <div class="glass-card p-4 text-center h-100 project-card hover-accent position-relative">
                            ${isMe ? '<div class="position-absolute top-0 start-0 m-3"><span class="badge bg-accent rounded-pill small">YOU</span></div>' : ''}
                            <div class="mb-3 position-relative d-inline-block">
                                <img src="${picUrl}" alt="${uname}" class="rounded-circle" style="width: 80px; height: 80px; object-fit: cover; border: 3px solid ${isMe ? 'var(--accent-color)' : 'rgba(255,255,255,0.1)'};">
                                ${isOnline ? '<span class="position-absolute bottom-0 end-0 bg-success border border-2 border-dark rounded-circle" style="width: 18px; height: 18px;"></span>' : ''}
                            </div>
                            <h5 class="fw-bold mb-1">${uname}</h5>
                            <div class="mb-2">${statusHtml}</div>
                            <div class="mb-3">${badgeHtml}</div>
                            
                            <a href="chat.html?with=${uname}" class="btn btn-sm btn-accent rounded-pill px-4 mb-3 w-100">
                                <i class="bi bi-chat-fill me-2"></i>Message
                            </a>

                            <div class="mt-2 pt-3 border-top border-secondary border-opacity-25 text-start">
                                <p class="text-secondary small mb-1"><i class="bi bi-person-fill me-2"></i>Username: <strong class="text-light">${uname}</strong></p>
                                <p class="text-secondary small mb-0"><i class="bi bi-key-fill me-2"></i>Password: <strong class="text-muted">••••••••</strong></p>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            if (html === '') {
                grid.innerHTML = '<div class="col-12 text-center text-secondary py-5"><i class="bi bi-person-x display-1 mb-3 opacity-25"></i><p class="fs-4">No users are currently signed in.</p><a href="index.html" class="btn btn-accent rounded-pill px-4 mt-3">Sign In to See Yourself</a></div>';
            } else {
                grid.innerHTML = html;
            }
        });
    </script>
</body>
</html>
